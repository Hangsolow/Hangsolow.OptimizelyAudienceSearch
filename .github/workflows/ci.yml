name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Pack validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore dependencies
        run: dotnet restore src/Hangsolow.OptimizelyAudienceSearch/Hangsolow.OptimizelyAudienceSearch.csproj

      - name: Build
        run: dotnet build src/Hangsolow.OptimizelyAudienceSearch/Hangsolow.OptimizelyAudienceSearch.csproj --no-restore --configuration Release

      - name: Pack (validation)
        run: dotnet pack src/Hangsolow.OptimizelyAudienceSearch/Hangsolow.OptimizelyAudienceSearch.csproj --no-build --configuration Release --output ./artifacts
